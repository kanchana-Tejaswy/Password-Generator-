<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<link rel="stylesheet" href="style.css"> 
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=content_copy" /> 
<title>Password Generator</title> 
</head> 

<body> 
<div class="container"> 
<h1>Password Generator</h1> 

<div class="inputBox"> 
<input type="text" class="passBox" id="passBox" readonly> 
<span class="material-symbols-outlined" id="copyIcon"> content_copy </span> 
</div> 

<input type="range" min="4" max="9" value="6" id="inputSlider"> 

<div class="row"> 
<p>Password Length</p> 
<span id="sliderValue"></span> 
</div> 

<div class="row"> 
<label for="Uppercase">include Uppercase Letter (A-Z)</label> 
<input type="checkbox" name="Uppercase" id="Uppercase"> 
</div> 

<div class="row"> 
<label for="lowercase">include Lowercase Letter (a-z)</label> 
<input type="checkbox" name="lowercase" id="lowercase"> 
</div> 

<div class="row"> 
<label for="number">include number (0-9)</label> 
<input type="checkbox" name="number" id="number"> 
</div> 

<div class="row"> 
<label for="symbols">include Symbols (!@#$%^&*)</label> 
<input type="checkbox" name="symbols" id="symbols"> 
</div> 

<button type="button" class="genBtn" id="genBtn">Generate</button> 

</div> 

<script src="pass.js"></script> 
</body> 
</html>
